front:
  text: 虛皇天尊初眞十戒文
  hash: sha256:0ea9ed04231f2d13619919fdbf4126dd3fcbf0b9f731e4676f7aa94ba3e63230
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0181_CK-KZ_01p053a, image: JY272/CK-KZ_JY272_01p053a.png}
body:
  text: 謹按虛皇天尊言出家超俗皆宿有良契故能獨拔常倫若愼終如始精至修鍊當福及七祖慶流一門所謂九層之臺起於累土千里之行始於足下入道之門積德之基亦必由此始開度之時宜受初眞之戒其戒有十爾當受之第一戒者不得不忠不孝不仁不信當盡節君親推誠萬物按傳曰仙經萬卷忠孝爲先蓋致身事君勤勞王事所以荅覆庇之恩也修身愼行善事父母所以荅生育之恩也事師如事父母所以荅教誨之恩也民生於三事之如一乃報本之大者加以仰不愧於天俯不怍於人敬信神明所以荅造化之恩也併前三事謂之四恩至於祝國延禧除妖卻害化民爲善禆王化之所未及乃出家之忠也生則誘其親以惜福向道死則爲之遷神福鄉其處已則離諸恩愛息諸塵緣專精一心勤於學道道功既就則雖億劫種親皆得超度上可以報四重之恩下可以濟三途之苦廼出家之孝也至於不仁者欺心妄作越禮非爲不信者虛誕自矜華辭惑眾要當知大忠者不昧其心至一物不欺大孝者不悖於理至一體皆愛然則一語欺心非忠也一事悖理非孝也故忠孝爲諸戒之首百行之源學者之先務也若能依上遵守而行則可以盡節君親推誠萬物矣第二戒者不得陰賊潛謀害物利己當行陰德廣濟羣生夫陰賊潛謀者是暗中使人爲非教唆詞訟之謂也令人入於陷阱憲網之中而自得快樂害物利己之念迨不可勝言若或返照迴光化人爲善則廣陰德普濟羣生斯廼入道之第一義也第三戒者不得殺害含生以充滋味當行慈惠以及昆蟲蓋不殺生者所以存仁愛也夫禽獸旁生性命同禀有夫婦之配有父子之情有巢穴之居有飲食之念愛憎喜懼何異於人能懷惻隱之心不忍殺戮而食以證慈悲之行不亦善乎或心雖仁民愛物而迹廼混俗眾中有所未便則不起意殺不下手殺不眼見殺三淨是則飲食隨緣又何殺生之有且聖賢於肉食固未常必其有无而仁愛之及物亦何常間乎彼此如網解三面迹遠庖廚釣而不綱弋不射宿啟蟄不殺方長不折德惠之普人蟲草木一視同仁後之不肉食者果能然乎又當知人生衣食之豐儉皆因前世修積之淺深今日分應所受廼能節之則當來之福益厚莫可量也果能如是則慈惠以及昆蟲豈虛言哉第四戒者不得淫邪敗眞穢慢靈炁當守眞操使无缺犯蓋不淫邪者所以戒亂倫也夫有家者特爲繼後承先而設故憑媒議通書娉明白婚娶又爲酒食以召鄕黨僚友以厚男女之别則夫婦之道禮所當然實不犯他人之色又何淫之有娼妓之徒名曰下賤正以其苟合亂人倫也若親此輩是與等矣然前代仙師亦有游戲妓門者蓋或以試鍊道心令見境不動或從化導有緣令背塵合覺後之凡夫或引以證已實乃左道濫遊眞妄不同仙凡異致端人正士自善主張未必溺於其所惑也其出家超俗者皆因宿有善慶所以獨拔常倫果能頓息塵緣斷絕色慾精修道行當證仙階福及九祖慶流一門經曰仙人道士非有靈質積精養炁以成眞者此也然或初基未明志節早宜修省以勗將來毋負善因復墮塵網當守眞操使毋缺犯則福德日新道功可就矣第五戒者不得敗人成功離人骨肉當以道助物令九族雍和夫不敗人成功者蓋聞人有一善則贊和之聞有諸惡必當掩之使之成功不至喪德又不離人骨肉者或見有親族不和父子夫妻兄弟師友因矛盾而至參商者當以道勸勉使之雍和令不離間則人倫不廢道義兩全實登眞之要路也學道之士宜各體知第六戒者不得讒毀賢良露才揚已當稱人之美善不自伐其功能蓋誠爲入道之門語者心之聲也語之妄由心之不誠也心旣不誠而謂之道是謂背道求道旡有是處但遇賢良而讒毀之則露才揚己自伐功能皆非正士之所宜有必當稱人之美善庶幾成己之功勤此固學者之深戒也第七戒者不得飲酒過差食肉違禁當調和氣性專務清虛夫不飲酒者所以戒亂性也蓋酒本以行禮浹洽和氣古人主賓百拜終日而不至醉示有節也後人嗜慾无厭縱飲謀醉遂至形骸顛倒禮法喪失或以致病或以搆禍罔覺其非儻隨平日酒量深淺減節飲之不使過量又何亂性之有且食肉違禁者如牛之有功犬之有義鴈之有序鯉鱔朝斗此等之肉又安忍食之能推此心戒而不食則可以調和氣性感格眞靈專務清虛而道業日新玄功時著矣凡所學者宜自愼焉第八戒者不得貪求無厭積財不散當行節儉惠恤貧窮夫人之貧富命禀生初悉已前定若生財有分用盡還來若胎骨受貧廣求不富能明此理一切取覓付之自然非己之財不妄取非義之財不苟得合得之財隨分取可不陷於貪求無厭之慾亦有積而不散致招殃禍者然吾黨之士先須識破幻假以惠恤貧窮節儉謹守隨緣度日勿苦貪求常使心地虛閑物欲消遣久則自然與道合眞矣第九戒者不得交游非賢居處雜穢當慕勝已棲集清虛夫初心出家未能獨立須仗叢林或結道伴遞相扶持不至偏頗然友分三等有雲朋霞友有良朋知友有狂朋恠友凡有志節鍊心地究罪福絕塵情逍遙方外同志相求遂與爲友此等謂之雲朋霞友以其心與雲霞相似塵事礙他不住故也又有習學經書高談闊論此等謂之良朋知友以其不鍊心亦不能作惡故也又有一等不治心地不習經典不顧罪福出語乖訛作事狂橫觸著一毫便起爭鬬誇强逞俊恃力恃勝欺壓良善相率成黨此等謂之狂朋恠友此三等人身謝之後各有安置去處隨其功業各得受報其雲朋霞友升入无形游宴玉京或爲神仙或爲天官其良朋知友塵心未盡不出人倫其狂朋恠友受了十分供養全無功德填還口債或墮酆都或墮旁生輪迴苦惱若到如斯悔之何及如上三友宜審擇焉學者思之各尋長便當慕勝己棲集清虛不負父母遣子出家之心不孤聖朝開教度人之意所宜體悉庶獲成功第十戒者不得輕忽言笑舉動非眞當持重寡辭以道德爲務按古云端謹嚴重不富即貴輕浮薄劣不夭即貧而輕忽語言脇肩諂笑曲學阿世小人之歸實非正士之所宜有況持重寡辭動容中式乃進道之要誠達者之所當爲若能恪守力行何患乎高尙之不至歟虛皇天尊初眞十戒文終
